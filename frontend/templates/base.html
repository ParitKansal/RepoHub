<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitClone</title>
    <!-- Open Graph -->
    <meta property="og:title" content="GitClone">
    <meta property="og:description" content="A GitHub-like platform for managing repositories.">
    <meta property="og:image" content="/static/image.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="/static/image.png">
    <!-- Tailwind CSS via CDN (Standard CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --github-dark: #080f1e;
            --github-darker: #040810;
            --github-border: #1a3a6b;
            --github-header: #0d1b38;
            --github-text: #cdd9f0;
            --github-blue: #1d6fe8;
            --github-lblue: #5a9cf5;
            --github-green: #2ea043;
            --github-red: #da3633;
        }
        .bg-github-dark { background-color: var(--github-dark); }
        .bg-github-darker { background-color: var(--github-darker); }
        .bg-github-header { background-color: var(--github-header); }
        .text-github-text { color: var(--github-text); }
        .text-github-blue { color: var(--github-blue); }
        .text-github-lblue { color: var(--github-lblue); }
        .text-github-green { color: var(--github-green); }
        .text-github-red { color: var(--github-red); }
        .border-github-border { border-color: var(--github-border); }
        .hover\:bg-github-border:hover { background-color: var(--github-border); }
        .hover\:text-github-blue:hover { color: var(--github-blue); }
        .focus\:border-github-blue:focus { border-color: var(--github-blue); }
        .bg-github-blue { background-color: var(--github-blue); }
        .bg-github-green { background-color: var(--github-green); }
        .bg-github-red { background-color: var(--github-red); }
    </style>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::selection { background: #1d6fe8; color: #fff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080f1e; }
        ::-webkit-scrollbar-thumb { background: #1d6fe8; border-radius: 3px; }
    </style>
</head>
<body class="bg-github-dark text-github-text min-h-screen font-sans antialiased flex flex-col">

    <!-- Top Navigation Bar -->
    <nav class="bg-github-header border-b border-github-border text-white px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <a href="/" class="text-white hover:text-github-lblue flex items-center space-x-2 transition-colors">
                <img src="/static/image.png" alt="GitClone" class="w-8 h-8">
                <span class="text-xl font-semibold tracking-tight">GitClone</span>
            </a>

            {% if user %}
            <!-- Search Bar -->
            <div class="hidden md:flex ml-4">
                <form action="/search" method="GET" class="relative">
                    <input type="text" name="q" placeholder="Search or jump to..." class="bg-github-darker border border-github-border rounded-md px-3 py-1 text-sm text-white focus:outline-none focus:border-github-blue focus:ring-1 focus:ring-github-blue w-64 placeholder-gray-500" required>
                    <button type="submit" class="absolute right-2 top-1.5 text-xs text-gray-500 border border-github-border rounded px-1 hover:text-white hover:border-github-blue">↵</button>
                </form>
            </div>
            {% endif %}
        </div>

        <div class="flex items-center space-x-4 text-sm font-semibold">
            {% if user %}
                <a href="/dashboard" class="hover:text-github-lblue transition-colors">Dashboard</a>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 rounded-full bg-github-blue flex items-center justify-center text-xs text-white font-bold">
                        {{ user.username[0]|upper }}
                    </div>
                    <span>{{ user.username }}</span>
                </div>
                <a href="/logout" class="text-gray-400 hover:text-github-lblue transition-colors"><i class="fa-solid fa-sign-out-alt"></i></a>
            {% else %}
                <a href="/login" class="hover:text-github-lblue text-gray-300 transition-colors">Sign in</a>
                <a href="/register" class="border border-github-blue hover:bg-github-blue text-github-lblue hover:text-white rounded-md px-3 py-1 transition-colors">Sign up</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-github-border mt-12 py-8 text-center text-xs text-gray-500">
        <p>&copy; 2026 GitClone Inc. All rights reserved.</p>
    </footer>
</body>
</html>
