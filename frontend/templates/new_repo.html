{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <div class="border-b border-github-border pb-4 mb-6">
        <h1 class="text-2xl text-white font-medium mb-1">Create a new repository</h1>
        <p class="text-gray-400 text-sm">A repository contains all project files, including the revision history. Already have a project repository elsewhere?</p>
    </div>
    
    <form action="/repo/new" method="POST">
            <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrftoken', '') }}">
        <div class="mb-6">
            <label for="repo_name" class="block font-semibold text-white mb-2 text-sm">Repository name <span class="text-red-500">*</span></label>
            <input type="text" id="repo_name" name="repo_name" placeholder="my-awesome-project" required pattern="[a-zA-Z0-9_-]+" class="w-full md:w-1/2 bg-github-dark border border-github-border rounded-md px-3 py-1.5 text-white focus:outline-none focus:border-github-blue focus:ring-1 focus:ring-github-blue text-sm">
            <p class="text-gray-500 text-xs mt-2">Great repository names are short and memorable. Need inspiration? How about <strong class="text-white">stunning-waffle</strong>?</p>
        </div>
        
        <div class="mb-6">
            <label for="description" class="block font-semibold text-white mb-2 text-sm">Description <span class="text-gray-500 font-normal">(optional)</span></label>
            <input type="text" id="description" name="description" class="w-full bg-github-dark border border-github-border rounded-md px-3 py-1.5 text-white focus:outline-none focus:border-github-blue focus:ring-1 focus:ring-github-blue text-sm">
        </div>
        
        <hr class="border-github-border my-6">
        
        <div class="mb-6 space-y-4">
            <label class="flex items-start space-x-3 cursor-pointer">
                <input type="radio" name="visibility" value="public" class="mt-1 bg-github-dark border-github-border text-github-blue focus:ring-github-blue" checked>
                <div>
                    <div class="flex items-center space-x-2">
                        <i class="fa-regular fa-bookmark text-gray-400"></i>
                        <span class="font-semibold text-white">Public</span>
                    </div>
                    <p class="text-gray-500 text-xs mt-0.5">Anyone on the internet can see this repository. You choose who can commit.</p>
                </div>
            </label>
            
            <label class="flex items-start space-x-3 cursor-pointer">
                <input type="radio" name="visibility" value="private" class="mt-1 bg-github-dark border-github-border text-github-blue focus:ring-github-blue">
                <div>
                    <div class="flex items-center space-x-2">
                        <i class="fa-solid fa-lock text-yellow-500"></i>
                        <span class="font-semibold text-white">Private</span>
                    </div>
                    <p class="text-gray-500 text-xs mt-0.5">You choose who can see and commit to this repository.</p>
                </div>
            </label>
        </div>
        
        <hr class="border-github-border my-6">
        
        <button type="submit" class="bg-github-green hover:bg-green-600 text-white font-semibold py-1.5 px-4 rounded-md text-sm transition-colors shadow">Create repository</button>
    </form>
</div>
{% endblock %}
