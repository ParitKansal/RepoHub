{% extends "repo_base.html" %}
{% set current_tab = 'settings' %}

{% block repo_content %}
<div class="w-full py-6">
    <h2 class="text-2xl font-normal text-white border-b border-github-border pb-2 mb-6">Settings</h2>

    <div class="border border-red-900 rounded-md bg-github-dark">
        <div class="bg-[#161b22] px-4 py-3 border-b border-red-900 font-semibold text-white">
            Danger Zone
        </div>
        <div class="p-4">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <div>
                    <h3 class="font-semibold text-white mb-1">Delete this repository</h3>
                    <p class="text-sm text-gray-400">Once you delete a repository, there is no going back. Please be certain.</p>
                </div>
                <div>
                    <form action="/{{ owner.username }}/{{ repo.name }}/delete" method="POST" onsubmit="return confirm('Are you ABSOLUTELY sure you want to delete this repository? This action cannot be undone.');">
            <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrftoken', '') }}">
                        <button type="submit" class="bg-github-dark hover:bg-red-900 border border-red-900 text-red-500 hover:text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors">
                            Delete repository
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
