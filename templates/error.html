{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 p-8 border border-github-border rounded-lg bg-github-dark text-center">
    <div class="mb-4">
        <i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl"></i>
    </div>
    <h2 class="text-2xl font-bold text-white mb-4">Error</h2>
    <p class="text-gray-400 mb-6">{{ error }}</p>
    <a href="/" class="bg-github-blue hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded transition-colors inline-block">
        Go Home
    </a>
</div>
{% endblock %}
