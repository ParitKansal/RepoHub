{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="text-center mb-6">
        <i class="fa-brands fa-github text-5xl text-white mb-4"></i>
        <h2 class="text-2xl font-light text-white tracking-tight">Sign in to GitClone</h2>
    </div>
    
    <div class="bg-github-header border border-github-border rounded-lg p-6 shadow-xl">
        {% if error %}
        <div class="bg-red-900/50 border border-github-red text-white px-4 py-3 rounded mb-4 relative" role="alert">
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-white mb-1">Username or email address</label>
                <input type="text" id="username" name="username" required class="w-full bg-github-dark border border-github-border rounded-md px-3 py-1.5 text-white focus:outline-none focus:border-github-blue focus:ring-1 focus:ring-github-blue">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-white">Password</label>
                    <a href="#" class="text-xs text-github-blue hover:underline">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" required class="w-full bg-github-dark border border-github-border rounded-md px-3 py-1.5 text-white focus:outline-none focus:border-github-blue focus:ring-1 focus:ring-github-blue">
            </div>
            
            <button type="submit" class="w-full bg-github-green hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-md transition-colors mt-2">
                Sign in
            </button>
        </form>
    </div>
    
    <div class="mt-4 border border-github-border rounded-lg p-4 text-center text-sm">
        <span class="text-gray-400">New to GitClone?</span>
        <a href="/register" class="text-github-blue hover:underline">Create an account.</a>
    </div>
</div>
{% endblock %}
