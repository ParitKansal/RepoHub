{% extends "repo_base.html" %}
{% set current_tab = 'commits' %}

{% block repo_content %}
<div class="mt-4">
    <div class="mb-4">
        <h3 class="text-xl font-semibold text-white">Commit History</h3>
    </div>
    
    <div class="border border-github-border rounded-lg bg-github-dark">
        <div class="divide-y divide-github-border">
            {% for commit in commits %}
            <div class="p-4 hover:bg-gray-800/30 transition-colors flex items-start space-x-4">
                <!-- Avatar placeholder -->
                <div class="mt-1 flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-r from-gray-600 to-gray-500 flex items-center justify-center text-xs text-white">
                    <i class="fa-solid fa-code-commit"></i>
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="text-white font-semibold text-sm hover:text-github-blue cursor-pointer truncate mr-4">{{ commit.message }}</h4>
                        <div class="flex items-center space-x-2">
                            <span class="text-xs font-mono bg-github-header border border-github-border text-github-blue px-2 py-1 rounded truncate w-24 text-center">{{ commit.hash[:7] }}</span>
                            <button class="bg-github-header border border-github-border text-gray-400 hover:text-white px-2 py-1 rounded" title="Browse files at this point in history">
                                <i class="fa-solid fa-code"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 flex items-center space-x-1">
                        <span class="font-semibold text-gray-300">{{ commit.author }}</span>
                        <span>committed</span>
                        <span>{{ commit.date }}</span>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="p-8 text-center text-gray-500">
                <i class="fa-solid fa-clock-rotate-left text-3xl mb-2"></i>
                <p>No commits found.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
