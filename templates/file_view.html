{% extends "repo_base.html" %}
{% set current_tab = 'code' %}

{% block repo_content %}

<article>
    <header>{{ filepath }}</header>
    {% if content is not none %}
    <pre><code>{{ content }}</code></pre>
    {% else %}
    <p>File not found or unable to read content.</p>
    {% endif %}
</article>
{% endblock %}
